name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      github.actor != 'claude[bot]' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
      )

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Debug event
        run: echo '${{ toJSON(github.event) }}'
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Project Setup
        run: |
          npm run setup
          npm run dev:daemon &
          sleep 10
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          settings: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": [
                    "@playwright/mcp@latest",
                    "--allowed-origins",
                    "localhost:3000;cdn.tailwindcss.com;esm.sh"
                  ]
                }
              }
            }

          claude_args: |
            --allowedTools "Bash(npm:*),Bash(sqlite3:*),mcp__playwright__browser_snapshot,mcp__playwright__browser_click,mcp__playwright__browser_close,mcp__playwright__browser_resize,mcp__playwright__browser_console_messages,mcp__playwright__browser_handle_dialog,mcp__playwright__browser_file_upload,mcp__playwright__browser_install,mcp__playwright__browser_press_key,mcp__playwright__browser_navigate,mcp__playwright__browser_navigate_back,mcp__playwright__browser_navigate_forward,mcp__playwright__browser_network_requests,mcp__playwright__browser_pdf_save,mcp__playwright__browser_take_screenshot,mcp__playwright__browser_drag,mcp__playwright__browser_hover,mcp__playwright__browser_type,mcp__playwright__browser_select_option,mcp__playwright__browser_tab_list,mcp__playwright__browser_tab_new,mcp__playwright__browser_tab_select,mcp__playwright__browser_tab_close,mcp__playwright__browser_generate_playwright_test,mcp__playwright__browser_wait_for"

            prompt: |
            User request:
            ${{ github.event.issue.body || github.event.comment.body }}

            You are an AI QA engineer and developer.

            Always reproduce the issue in the browser BEFORE reading the code.

            Follow this workflow strictly:

            STEP 1 — INVESTIGATE
            - Use Playwright MCP to explore the application.
            - Navigate to http://localhost:3000.
            - Interact with the UI like a real user.
            - Take screenshots if useful.
            - Inspect logs.txt if needed.
            - Query the SQLite database with `sqlite3` if data is involved.

            STEP 2 — REPRODUCE
            - Create a Playwright test that reproduces the problem.
            - Save the test under tests/.
            - Run the tests using npm.

            STEP 3 — PROPOSE FIX
            - If the test fails, identify the root cause.
            - Modify the code to fix the issue.
            - Run the tests again to confirm the fix.

            OUTPUT
            - Post a comment in the issue summarizing:
              Investigation
              Reproduction steps
              Root cause
              Proposed fix

            Always prefer:
            - Browser interaction with Playwright
            - Tests before code changes
